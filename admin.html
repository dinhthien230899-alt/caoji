<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>草集 · 后台管理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-body">
    <!-- 登录遮罩 -->
    <div class="login-overlay" id="loginOverlay">
      <div class="login-box">
        <h2>草集后台</h2>
        <p>请输入管理密码</p>
        <input type="password" id="passwordInput" placeholder="管理密码" />
        <button onclick="doLogin()">进入后台</button>
        <p style="font-size:12px;margin-top:8px;color:var(--muted);">默认密码: caoji2024</p>
      </div>
    </div>

    <!-- 顶部 -->
    <header class="admin-header">
      <h1>草集 · 后台管理</h1>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn-primary" onclick="addProduct()">+ 新增商品</button>
        <button class="btn-import" onclick="importJSON()">📥 导入</button>
        <button class="btn-export" onclick="exportJSON()">📤 导出</button>
        <button class="btn-primary" onclick="deployToGithub()" id="deployBtn" style="background:var(--red);">🚀 部署上线</button>
        <button class="btn-danger" onclick="changePassword()">修改密码</button>
        <button style="background:#555;color:#fff;min-height:36px;padding:0 14px;border:0;border-radius:6px;font:inherit;font-weight:800;font-size:14px;cursor:pointer;" onclick="setToken()">🔑 设置Token</button>
        <button style="background:#e67e22;color:#fff;min-height:36px;padding:0 14px;border:0;border-radius:6px;font:inherit;font-weight:800;font-size:14px;cursor:pointer;" onclick="allOutOfStock()">⚠ 全部无库存</button>
      </div>
    </header>

    <!-- 统计 -->
    <div class="admin-stats">
      <div class="stat-card"><strong id="statTotal">0</strong><span>商品总数</span></div>
      <div class="stat-card"><strong id="statInStock">0</strong><span>有库存</span></div>
      <div class="stat-card danger"><strong id="statOut">0</strong><span>无库存</span></div>
      <div class="stat-card warning"><strong id="statLow">0</strong><span>低库存 (≤5)</span></div>
    </div>

    <!-- 筛选 -->
    <div class="admin-filter">
      <select id="filterCategory" onchange="renderTable()">
        <option value="全部">全部</option>
        <option value="手卷烟丝">手卷烟丝</option>
        <option value="烟斗烟草">烟斗烟草</option>
        <option value="风味系列">风味系列</option>
        <option value="配件滤嘴">配件滤嘴</option>
        <option value="烟纸配件">烟纸配件</option>
      </select>
      <input type="text" id="searchName" placeholder="搜索商品名称..." oninput="renderTable()" />
    </div>

    <!-- 商品列表 -->
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead>
          <tr>
            <th>图片</th>
            <th>名称</th>
            <th>分类</th>
            <th>价格</th>
            <th>库存</th>
            <th>规格</th>
            <th>推荐</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <!-- 编辑弹窗 -->
    <div class="modal-overlay" id="editModal" style="display:none;">
      <div class="modal-panel">
        <h3 id="modalTitle">编辑商品</h3>
        <label><span>商品名称</span><input type="text" id="editName" /></label>
        <label><span>分类</span>
          <select id="editCategory">
            <option value="手卷烟丝">手卷烟丝</option>
            <option value="烟斗烟草">烟斗烟草</option>
            <option value="风味系列">风味系列</option>
            <option value="配件滤嘴">配件滤嘴</option>
            <option value="烟纸配件">烟纸配件</option>
          </select>
        </label>
        <label><span>价格 (元)</span><input type="number" id="editPrice" min="0" /></label>
        <label><span>库存数量 (0=无库存)</span><input type="number" id="editStock" min="0" /></label>
        <label><span>规格描述</span><input type="text" id="editSpec" placeholder="如：手卷烟丝 50g" /></label>
        <label><span>主图</span>
          <div style="display:flex;gap:6px;">
            <input type="text" id="editImage" placeholder="选择图片或输入路径" style="flex:1;" />
            <button type="button" class="btn-primary" style="font-size:12px;min-height:30px;white-space:nowrap;" onclick="pickImage('editImage','mainPreview')">📷 选择</button>
          </div>
          <img id="mainPreview" style="max-width:200px;max-height:150px;margin-top:6px;display:none;border-radius:6px;border:1px solid var(--border-color, #ddd);" />
        </label>
        <label><span>图片替代文本</span><input type="text" id="editAlt" /></label>
        <label><span>详情大图</span></label>
        <div id="detailList" style="margin-bottom:8px;"></div>
        <button class="btn-primary" style="font-size:12px;min-height:30px;" onclick="addDetailField()">+ 添加详情图</button>
        <label style="margin-top:10px;">
          <input type="checkbox" id="editFeatured" /> 新客推荐 (首页展示)
        </label>
        <div class="modal-actions">
          <button class="btn-primary" onclick="saveEdit()">保存</button>
          <button style="background:#9c9c9c;color:#fff;" onclick="closeModal()">取消</button>
        </div>
      </div>
    </div>

    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="handleImport(event)" />

    <script>
      // ========== 登录 ==========
      var DEFAULT_PASSWORD = "caoji2024";
      var PWD_KEY = "caoji_admin_pwd";

      function doLogin() {
        var input = document.getElementById("passwordInput").value.trim();
        var saved = localStorage.getItem(PWD_KEY) || DEFAULT_PASSWORD;
        if (input !== saved) {
          alert("密码错误！");
          return;
        }
        document.getElementById("loginOverlay").style.display = "none";
        checkToken();
      }

      // ========== GitHub Token 配置 ==========
      var TOKEN_KEY = "caoji_github_token";
      var REPO_OWNER = "dinhthien230899-alt";
      var REPO_NAME = "caoji";

      function getToken() {
        return localStorage.getItem(TOKEN_KEY);
      }

      function checkToken() {
        if (!getToken()) {
          setTimeout(function() {
            var t = prompt("请输入 GitHub Token（只需配置一次）：\n\n获取方式：https://github.com/settings/tokens\n需要勾选 repo 权限");
            if (t && t.trim()) {
              localStorage.setItem(TOKEN_KEY, t.trim());
              alert("Token 已保存！现在可以使用「部署上线」功能了。");
            }
          }, 500);
        }
      }

      function setToken() {
        var t = prompt("请输入新的 GitHub Token：");
        if (t && t.trim()) {
          localStorage.setItem(TOKEN_KEY, t.trim());
          alert("Token 已更新！");
        }
      }

      // ========== 部署上线 ==========
      function deployToGithub() {
        var token = getToken();
        if (!token) {
          alert("请先配置 GitHub Token！");
          setToken();
          return;
        }

        var btn = document.getElementById("deployBtn");
        btn.textContent = "⏳ 部署中...";
        btn.disabled = true;

        // 步骤1：获取当前文件的 SHA
        var apiBase = "https://api.github.com/repos/" + REPO_OWNER + "/" + REPO_NAME + "/contents/products.json";

        fetch(apiBase, {
          headers: { "Authorization": "Bearer " + token }
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (!data.sha) throw new Error("获取文件信息失败: " + (data.message || "未知错误"));

          // 步骤2：上传新内容
          var newContent = JSON.stringify(products, null, 2);
          var body = {
            message: "后台更新商品数据",
            content: btoa(unescape(encodeURIComponent(newContent))),
            sha: data.sha,
            branch: "main"
          };

          return fetch(apiBase, {
            method: "PUT",
            headers: {
              "Authorization": "Bearer " + token,
              "Content-Type": "application/json"
            },
            body: JSON.stringify(body)
          });
        })
        .then(function(r) { return r.json(); })
        .then(function(result) {
          if (result.content) {
            btn.textContent = "✅ 已上线！";
            btn.style.background = "var(--green)";
            alert("部署成功！\n\n1-2 分钟后刷新网站即可看到更新。\n\n网站地址：https://" + REPO_OWNER + ".github.io/" + REPO_NAME + "/");
            setTimeout(function() {
              btn.textContent = "🚀 部署上线";
              btn.style.background = "var(--red)";
              btn.disabled = false;
            }, 3000);
          } else {
            throw new Error(result.message || "部署失败");
          }
        })
        .catch(function(err) {
          btn.textContent = "❌ 部署失败";
          btn.disabled = false;
          alert("部署失败：" + err.message + "\n\n请检查：\n1. Token 是否正确\n2. Token 是否有 repo 权限\n3. 网络是否正常");
          setTimeout(function() {
            btn.textContent = "🚀 部署上线";
            btn.style.background = "var(--red)";
          }, 3000);
        });
      }

      function changePassword() {
        var oldPwd = prompt("请输入当前密码：");
        var saved = localStorage.getItem(PWD_KEY) || DEFAULT_PASSWORD;
        if (oldPwd !== saved) { alert("密码错误！"); return; }
        var newPwd = prompt("请输入新密码：");
        if (!newPwd) return;
        localStorage.setItem(PWD_KEY, newPwd);
        alert("密码已修改！下次登录生效。");
      }

      // ========== 数据 ==========
      var products = [];
      var editingId = null;

      function loadData() {
        // 优先 fetch
        fetch("products.json")
          .then(function (r) { return r.json(); })
          .then(function (data) {
            products = data;
            renderTable();
            updateStats();
          })
          .catch(function () {
            // 降级：从 localStorage 恢复
            var saved = localStorage.getItem("caoji_admin_draft");
            if (saved) {
              products = JSON.parse(saved);
              renderTable();
              updateStats();
              alert("已从本地草稿恢复数据。\n提示：需要通过 HTTP 服务打开本页面才能直接加载 products.json（如 npx serve .）");
            } else {
              alert("无法加载商品数据。请通过 HTTP 服务打开本页面，或使用「导入 JSON」按钮。");
            }
          });
      }

      function saveLocal() {
        try {
          localStorage.setItem("caoji_admin_draft", JSON.stringify(products));
        } catch (e) {
          // localStorage 满了（base64 图片太多），不报错，导出 JSON 仍可用
          console.warn("本地草稿保存失败（可能图片太多），请及时导出 JSON 备份。");
        }
      }

      // ========== 统计 ==========
      function updateStats() {
        var total = products.length;
        var inStock = products.filter(function (p) { return p.stock > 0; }).length;
        var out = products.filter(function (p) { return p.stock === 0; }).length;
        var low = products.filter(function (p) { return p.stock > 0 && p.stock <= 5; }).length;

        document.getElementById("statTotal").textContent = total;
        document.getElementById("statInStock").textContent = inStock;
        document.getElementById("statOut").textContent = out;
        document.getElementById("statLow").textContent = low;
      }

      // ========== 表格渲染 ==========
      function renderTable() {
        var filter = document.getElementById("filterCategory").value;
        var search = document.getElementById("searchName").value.toLowerCase();
        var tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";

        var filtered = products.filter(function (p) {
          if (filter !== "全部" && p.category !== filter) return false;
          if (search && p.name.toLowerCase().indexOf(search) === -1) return false;
          return true;
        });

        if (filtered.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;color:var(--muted);">暂无商品</td></tr>';
          return;
        }

        filtered.forEach(function (p) {
          var rowClass = "";
          if (p.stock === 0) rowClass = " row-out";
          else if (p.stock <= 5) rowClass = " row-low";

          var tr = document.createElement("tr");
          tr.className = rowClass;
          tr.innerHTML =
            '<td><img src="' + p.image + '" alt="" onerror="this.style.display=\'none\'" /></td>' +
            "<td><strong>" + p.name + "</strong></td>" +
            "<td>" + p.category + "</td>" +
            "<td>" + p.price + " 元</td>" +
            "<td>" + (p.stock === 0 ? '<span style="color:var(--red);font-weight:900;">0 (无库存)</span>' : p.stock) + "</td>" +
            "<td>" + p.spec + "</td>" +
            "<td>" + (p.featured ? "⭐" : "-") + "</td>" +
            '<td>' +
            '<button class="btn-primary" onclick="editProduct(\'' + p.id + '\')">编辑</button>' +
            '<button class="btn-danger" onclick="deleteProduct(\'' + p.id + '\')">删除</button>' +
            (p.stock > 0
              ? '<button style="background:#e67e22;color:#fff;min-height:28px;padding:0 10px;border:0;border-radius:4px;font:inherit;font-size:12px;font-weight:800;cursor:pointer;margin:1px;" onclick="toggleStock(\'' + p.id + '\')">设为无库存</button>'
              : '<button style="background:var(--green);color:#fff;min-height:28px;padding:0 10px;border:0;border-radius:4px;font:inherit;font-size:12px;font-weight:800;cursor:pointer;margin:1px;" onclick="restock(\'' + p.id + '\')">补货</button>') +
            "</td>";
          tbody.appendChild(tr);
        });
      }

      // ========== CRUD ==========
      function addProduct() {
        var newId = "product-" + Date.now();
        var newProduct = {
          id: newId,
          name: "",
          category: "手卷烟丝",
          price: 0,
          stock: 0,
          spec: "",
          image: "",
          alt: "",
          details: [],
          featured: false,
        };
        products.push(newProduct);
        editingId = newId;
        fillForm(newProduct);
        document.getElementById("modalTitle").textContent = "新增商品";
        document.getElementById("editModal").style.display = "flex";
        saveLocal();
        renderTable();
        updateStats();
      }

      function editProduct(id) {
        var p = products.find(function (item) { return item.id === id; });
        if (!p) return;
        editingId = id;
        fillForm(p);
        document.getElementById("modalTitle").textContent = "编辑商品";
        document.getElementById("editModal").style.display = "flex";
      }

      function deleteProduct(id) {
        if (!confirm("确定删除该商品？此操作不可撤销。")) return;
        products = products.filter(function (p) { return p.id !== id; });
        saveLocal();
        renderTable();
        updateStats();
      }

      function toggleStock(id) {
        var p = products.find(function(item) { return item.id === id; });
        if (!p) return;
        p.stock = 0;
        saveLocal();
        renderTable();
        updateStats();
      }

      function restock(id) {
        var p = products.find(function(item) { return item.id === id; });
        if (!p) return;
        var qty = prompt("请输入补货数量：", "10");
        if (qty === null) return;
        var num = parseInt(qty);
        if (isNaN(num) || num < 1) { alert("请输入有效数量（至少1件）！"); return; }
        p.stock = num;
        saveLocal();
        renderTable();
        updateStats();
      }

      function allOutOfStock() {
        if (!confirm("确定将所有商品设为无库存吗？")) return;
        products.forEach(function(p) { p.stock = 0; });
        saveLocal();
        renderTable();
        updateStats();
      }

      function saveEdit() {
        var formData = {
          name: document.getElementById("editName").value.trim(),
          category: document.getElementById("editCategory").value,
          price: parseInt(document.getElementById("editPrice").value) || 0,
          stock: parseInt(document.getElementById("editStock").value) || 0,
          spec: document.getElementById("editSpec").value.trim(),
          image: document.getElementById("editImage").value.trim(),
          alt: document.getElementById("editAlt").value.trim(),
          details: collectDetails(),
          featured: document.getElementById("editFeatured").checked,
        };

        if (!formData.name) { alert("请输入商品名称！"); return; }

        var idx = products.findIndex(function (p) { return p.id === editingId; });
        if (idx === -1) return;

        products[idx] = Object.assign({}, products[idx], formData);
        saveLocal();
        closeModal();
        renderTable();
        updateStats();

        // 提示部署
        if (getToken()) {
          setTimeout(function() {
            if (confirm("商品已保存！是否立即部署上线？")) {
              deployToGithub();
            }
          }, 300);
        }
      }

      function fillForm(p) {
        document.getElementById("editName").value = p.name || "";
        document.getElementById("editCategory").value = p.category || "手卷烟丝";
        document.getElementById("editPrice").value = p.price || 0;
        document.getElementById("editStock").value = p.stock || 0;
        document.getElementById("editSpec").value = p.spec || "";
        document.getElementById("editImage").value = p.image || "";
        document.getElementById("editAlt").value = p.alt || "";
        document.getElementById("editFeatured").checked = !!p.featured;

        // 主图预览
        var mainPreview = document.getElementById("mainPreview");
        if (p.image && p.image.indexOf("data:image/") === 0) {
          mainPreview.src = p.image;
          mainPreview.style.display = "block";
        } else if (p.image) {
          // 普通路径也尝试加载
          mainPreview.src = p.image;
          mainPreview.style.display = "block";
          mainPreview.onerror = function() { mainPreview.style.display = "none"; };
        } else {
          mainPreview.style.display = "none";
        }

        renderDetailFields(p.details || []);
      }

      function closeModal() {
        document.getElementById("editModal").style.display = "none";
        editingId = null;
      }

      // ========== 详情图 ==========
      function renderDetailFields(details) {
        var container = document.getElementById("detailList");
        container.innerHTML = "";
        (details || []).forEach(function (d, i) {
          container.appendChild(createDetailRow(d, i));
        });
      }

      function createDetailRow(value, index) {
        var uniqueId = "detail_" + Date.now() + "_" + index;
        var inputId = uniqueId + "_input";
        var previewId = uniqueId + "_preview";

        var div = document.createElement("div");
        div.className = "detail-list-item";
        div.style.cssText = "margin-bottom:6px;";

        var row = document.createElement("div");
        row.style.cssText = "display:flex;gap:6px;align-items:center;";

        var input = document.createElement("input");
        input.type = "text";
        input.id = inputId;
        input.value = value || "";
        input.placeholder = "选择图片或输入路径";
        input.style.cssText = "flex:1;";
        input.setAttribute("data-preview-id", previewId);

        var pickBtn = document.createElement("button");
        pickBtn.type = "button";
        pickBtn.className = "btn-primary";
        pickBtn.style.cssText = "font-size:12px;min-height:30px;white-space:nowrap;";
        pickBtn.textContent = "📷";
        pickBtn.onclick = function() { pickImage(inputId, previewId); };

        var delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.style.cssText = "background:var(--red);color:#fff;min-height:30px;padding:0 8px;border:0;border-radius:4px;font-size:12px;cursor:pointer;";
        delBtn.textContent = "×";
        delBtn.onclick = function() { div.remove(); };

        row.appendChild(input);
        row.appendChild(pickBtn);
        row.appendChild(delBtn);

        var preview = document.createElement("img");
        preview.id = previewId;
        preview.style.cssText = "max-width:150px;max-height:100px;margin-top:4px;display:none;border-radius:4px;border:1px solid var(--border-color, #ddd);";

        // 如果已有值且是 data URL，显示预览
        if (value && value.indexOf("data:image/") === 0) {
          preview.src = value;
          preview.style.display = "block";
        }

        div.appendChild(row);
        div.appendChild(preview);
        return div;
      }

      function addDetailField() {
        var container = document.getElementById("detailList");
        var idx = container.children.length;
        container.appendChild(createDetailRow("", idx));
      }

      function removeDetailField(btn) {
        btn.parentElement.remove();
      }

      function collectDetails() {
        var inputs = document.querySelectorAll("#detailList input");
        var result = [];
        inputs.forEach(function (inp) {
          var v = inp.value.trim();
          if (v) result.push(v);
        });
        return result;
      }

      // ========== 导入导出 ==========
      function importJSON() {
        document.getElementById("importFile").click();
      }

      function handleImport(event) {
        var file = event.target.files[0];
        if (!file) return;
        var reader = new FileReader();
        reader.onload = function (e) {
          try {
            var data = JSON.parse(e.target.result);
            if (!Array.isArray(data)) throw new Error("格式错误");
            products = data;
            saveLocal();
            renderTable();
            updateStats();
            alert("已导入 " + data.length + " 个商品！");
          } catch (err) {
            alert("导入失败：JSON 格式不正确。");
          }
        };
        reader.readAsText(file);
        event.target.value = "";
      }

      function exportJSON() {
        var blob = new Blob([JSON.stringify(products, null, 2)], { type: "application/json" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "products.json";
        a.click();
        URL.revokeObjectURL(url);
        alert("products.json 已下载！\n请将其放入项目文件夹，替换旧文件后重新部署。");
      }

      // ========== 本地图片处理（Canvas 压缩 → Base64） ==========
      function pickImage(inputId, previewId) {
        var fileInput = document.createElement("input");
        fileInput.type = "file";
        fileInput.accept = "image/*";
        fileInput.onchange = function(e) { handleImagePick(e, inputId, previewId); };
        fileInput.click();
      }

      function handleImagePick(event, inputId, previewId) {
        var file = event.target.files[0];
        if (!file) return;

        var targetInput = document.getElementById(inputId);
        if (targetInput) {
          targetInput.value = "⏳ 处理中...";
          targetInput.style.color = "var(--muted)";
        }

        // Canvas 压缩图片后转 base64
        var reader = new FileReader();
        reader.onload = function(e) {
          var img = new Image();
          img.onload = function() {
            var canvas = document.createElement("canvas");
            var w = img.width;
            var h = img.height;
            var maxW = 800; // 最大宽度
            if (w > maxW) {
              h = Math.round(h * (maxW / w));
              w = maxW;
            }
            canvas.width = w;
            canvas.height = h;
            var ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, w, h);
            var dataUrl = canvas.toDataURL("image/jpeg", 0.75);

            if (targetInput) {
              targetInput.value = dataUrl;
              targetInput.style.color = "";
            }

            var preview = document.getElementById(previewId);
            if (preview) {
              preview.src = dataUrl;
              preview.style.display = "block";
            }
          };
          img.src = e.target.result;
        };
        reader.readAsDataURL(file);
      }

      // ========== 键盘快捷键 ==========
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") closeModal();
      });

      // ========== 启动 ==========
      loadData();
    </script>
  </body>
</html>
